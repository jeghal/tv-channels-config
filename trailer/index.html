<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Bande-annonce</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #000; }
    #player { width: 100%; height: 100%; border: 0; background: #000; }
    #error { display: none; height: 100%; align-items: center; justify-content: center; color: #ddd; font: 28px Arial, sans-serif; }
  </style>
</head>
<body>
  <div id="error">Lecture impossible</div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var key = String(params.get("v") || "").trim();
      var error = document.getElementById("error");
      if (!/^[a-zA-Z0-9_-]{6,20}$/.test(key)) {
        error.style.display = "flex";
        return;
      }

      var frame = document.createElement("iframe");
      frame.id = "player";
      frame.title = "Bande-annonce";
      frame.allow = "autoplay; encrypted-media; picture-in-picture";
      frame.allowFullscreen = true;
      frame.referrerPolicy = "strict-origin-when-cross-origin";
      frame.src = "https://www.youtube-nocookie.com/embed/" + encodeURIComponent(key) +
        "?autoplay=1&controls=1&rel=0&playsinline=1&origin=" +
        encodeURIComponent(window.location.origin);
      document.body.appendChild(frame);

      window.addEventListener("keydown", function (event) {
        var code = event.keyCode || event.which;
        if (event.key === "Escape" || event.key === "Backspace" || code === 27 || code === 461) {
          window.parent.postMessage({ type: "iptv-trailer-close" }, "*");
          event.preventDefault();
        }
      });
      window.parent.postMessage({ type: "iptv-trailer-ready" }, "*");
    })();
  </script>
</body>
</html>
